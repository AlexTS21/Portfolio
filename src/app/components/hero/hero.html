<section id="hero" class="hero">
  <canvas #canvas class="hero__canvas"></canvas>

  <div class="hero__overlay"></div>

  <div class="hero__content">
    <div class="hero__badge glass fade-in">
      <span class="badge-dot"></span>
      <span>ML Engineer &amp; Web Developer</span>
    </div>

    <h1 class="hero__title fade-in">
      <em>Alejandro</em>
      <span class="line">Tejeda</span>
    </h1>

    <p class="hero__desc fade-in">
      I craft ML models and immersive web experiences — from training neural nets to show what the data mean.
    </p>

    <div class="hero__actions fade-in">
      <button class="btn-primary" (click)="scrollToProjects()">
        My Work
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 3v10M3 8.5l5 4.5 5-4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="btn-ghost glass" (click)="scrollToContact()" >Get in Touch</button>
    </div>

    <div class="hero__stats fade-in">
      <div class="stat glass">
        <span class="stat-num">2</span>
        <span class="stat-label">Years Exp.</span>
      </div>
      <div class="stat glass">
        <span class="stat-num">1</span>
        <span class="stat-label">Publication</span>
      </div>
    </div>
  </div>


  <div class="hero__scroll">
    <div class="scroll-line"></div>
    <span class="scroll-label">scroll</span>
  </div>
</section>
