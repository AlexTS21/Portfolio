<section id="projects" class="projects">
  <div class="projects__container">
    <div class="projects__header fade-in">
      <div class="section-tag">
        <span class="tag-line"></span>
        <span class="tag-text">Projects</span>
      </div>
      <h2 class="section-title">Selected Work</h2>
    </div>

    <div class="projects__layout fade-in">
      <div class="projects__nav">
        @for (project of projects; track $index) {
          <button
            class="project-tab"
            [class.active]="active === $index"
            (click)="active = $index">
            <span class="tab-index">{{ ($index + 1).toString().padStart(2, '0') }}</span>
            <span class="tab-title">{{ project.title }}</span>
            <span class="tab-tag">{{ project.tag }}</span>
          </button>
        }
       
      </div>

      <div class="project-card glass" *ngIf="projects[active] as p">
        <div class="card-header">
          <div class="card-meta">
            <span class="card-tag glass" [style.borderColor]="p.color + '55'">{{ p.tag }}</span>
            <span class="card-year">{{ p.year }}</span>
          </div>
          <h3 class="card-title" [style.color]="p.color">{{ p.title }}</h3>
        </div>
        <p class="card-desc">{{ p.desc }}</p>
        <div class="card-tech">
          <span class="tech-pill" *ngFor="let t of p.tech">{{ t }}</span>
        </div>
        <div class="card-actions">
          <a [href]="p.link" class="card-link">
            View Project
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
              <path d="M2 7h10M7 2l5 5-5 5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
        <div class="card-glow" [style.background]="p.color"></div>
      </div>
    </div>
  </div>
</section>
